spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_logs
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

  spring:
    kafka:
      bootstrap-servers: localhost:9092